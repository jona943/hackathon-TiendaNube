<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TiendaNube — Constructor IA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="layout-wrapper">
        <section class="chat-section">
            <header>
                <h1>TiendaNube <span>IA</span></h1>
                <p>Tu asistente para construir tiendas reales.</p>
            </header>
            <main id="chat-window">
                <div id="chat-messages">
                    <div class="message bot">
                        ¡Bienvenido! Soy tu arquitecto de TiendaNube. 
                        Dime qué tipo de tienda quieres y la construiré en el visor de la derecha.
                    </div>
                </div>
            </main>
            <footer>
                <form id="chat-form">
                    <input type="text" id="user-input" placeholder="Ej: Crea una tienda de ropa minimalista..." autocomplete="off" required>
                    <button type="submit" id="send-btn">Enviar</button>
                </form>
            </footer>
        </section>

        <aside class="visor-section">
            <div class="visor-toolbar">
                <div class="status-dot connected"></div>
                <span class="visor-title">Vista Previa en Vivo</span>
                <button id="toggle-code" class="btn-tool">Ver Código</button>
            </div>
            <div id="preview-container">
                <iframe id="store-preview" title="Vista previa de la tienda"></iframe>
                <div id="code-overlay" class="hidden">
                    <pre><code id="full-code"></code></pre>
                </div>
            </div>
        </aside>
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
