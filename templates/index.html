<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente Gemini — TiendaNube</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo-area">
                <h1>TiendaNube <span>Asistente IA</span></h1>
            </div>
            <p>Configura tu tienda y resuelve dudas en segundos.</p>
        </header>

        <main id="chat-window">
            <div id="chat-messages">
                <div class="message bot">
                    ¡Hola! Soy tu asistente de IA para TiendaNube. ¿En qué puedo ayudarte hoy? 
                    Puedo ayudarte a configurar tu tienda, elegir un diseño o darte consejos de venta.
                </div>
            </div>
        </main>

        <footer>
            <form id="chat-form">
                <input type="text" id="user-input" placeholder="Escribe tu consulta aquí..." autocomplete="off" required>
                <button type="submit" id="send-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                    </svg>
                </button>
            </form>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
